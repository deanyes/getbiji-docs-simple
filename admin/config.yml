backend:
  name: git-gateway
  branch: main

# 本地开发时使用
local_backend: true

media_folder: "docs/public/images"
public_folder: "/images"

locale: 'zh_Hans'

collections:
  - name: "guide"
    label: "📖 开始使用"
    folder: "docs/guide"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "voice"
    label: "🎙️ 语音记录"
    folder: "docs/voice"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "capture"
