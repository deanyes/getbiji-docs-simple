<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get笔记 · 使用文档</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    :root {
      --theme-color: #3b82f6;
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body { font-family: var(--base-font-family); }
    .sidebar { background: #fafafa; border-right: 1px solid #eee; }
    .sidebar-nav { padding: 20px; }
    .sidebar-nav a { color: #333; font-weight: 500; }
    .sidebar-nav a:hover { color: var(--theme-color); }
    .sidebar-nav li { margin: 8px 0; }
    .markdown-section { max-width: 800px; }
    .markdown-section h1 { font-weight: 600; border-bottom: none; }
    .markdown-section h3 { color: #666; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-top: 40px; }
    .markdown-section a { color: #333; text-decoration: none; border-bottom: 1px solid #ddd; }
    .markdown-section a:hover { color: var(--theme-color); border-color: var(--theme-color); }
    .markdown-section li { margin: 12px 0; line-height: 1.6; }
    .markdown-section hr { border: none; border-top: 1px solid #eee; margin: 30px 0; }
    .app-name-link { font-weight: 600 !important; font-size: 18px !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Get笔记',
      nameLink: '/',
      loadSidebar: false,
      maxLevel: 2
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
