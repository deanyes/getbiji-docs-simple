backend:
  name: proxy
  proxy_url: http://localhost:8081/api/v1

media_folder: "docs/public/images"
public_folder: "/images"

locale: 'zh_Hans'

collections:
  - name: "voice"
    label: "🎙️ 语音记录"
    folder: "docs/voice"
    create: true
    extension: "md"
    fields:
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "capture"
    label: "📸 更多记录方式"
